<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BarQuiz">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>BarQuiz v1.2.1</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ---- HEADER ---- */
    header {
      padding: calc(20px + env(safe-area-inset-top, 44px)) 20px 12px;
      text-align: center;
      position: relative;
    }
    header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #f7971e, #ffd200);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header .sub {
      font-size: 0.75rem;
      color: #888;
      margin-top: 2px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .score-row {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-top: 10px;
      font-size: 0.85rem;
    }
    .score-row span {
      color: #aaa;
    }
    .score-row strong {
      color: #ffd200;
      font-weight: 700;
    }

    /* ---- MAIN CARD ---- */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 12px 16px 0;
    }

    /* ---- CARD ANIMATIONS ---- */
    .card {
      background: #16213e;
      border-radius: 20px;
      padding: 24px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                  opacity 0.25s ease;
    }
    .card.swiping {
      transition: none;
    }
    .card.swipe-out {
      opacity: 0;
    }
    .card.swipe-out.left {
      transform: translateX(-120%) rotate(-8deg);
    }
    .card.swipe-out.right {
      transform: translateX(120%) rotate(8deg);
    }
    .card.swipe-in {
      transform: translateX(0) rotate(0);
      opacity: 1;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #f7971e, #ffd200);
    }

    .category-badge {
      display: inline-block;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      background: rgba(247, 151, 30, 0.15);
      color: #f7971e;
      padding: 4px 12px;
      border-radius: 20px;
      align-self: flex-start;
      margin-bottom: 12px;
    }

    .question-number {
      font-size: 0.75rem;
      color: #666;
      margin-bottom: 8px;
    }

    .question-text {
      font-size: 1.15rem;
      line-height: 1.45;
      font-weight: 600;
      margin-bottom: 16px;
      flex: 0 1 auto;
      max-height: 180px;
      overflow-y: auto;
    }

    /* ---- DYNAMIC CONTENT CONTAINER ---- */
    .game-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      margin-bottom: 12px;
    }

    /* ---- TYPE 1: ESTIMATE CODE ---- */
    .answer-section {
      text-align: center;
      width: 100%;
    }
    .answer-box {
      background: #0f3460;
      border-radius: 14px;
      padding: 18px;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      font-weight: 700;
      color: #ffd200;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
      border: 1px dashed rgba(255, 210, 0, 0.2);
    }
    .answer-box.hidden {
      color: transparent;
      background: #0f3460;
      border-color: rgba(255,255,255,0.08);
    }
    .answer-box.hidden .answer-text {
      filter: blur(8px);
      transition: filter 0.4s;
    }
    .answer-box .answer-text {
      filter: blur(0);
      transition: filter 0.3s;
    }
    .answer-box.revealed {
      border-style: solid;
      border-color: #ffd200;
      background: #1a2d50;
    }
    .tap-hint {
      font-size: 0.75rem;
      color: #777;
      margin-top: 8px;
    }

    /* ---- TYPE 2: MULTIPLE CHOICE ---- */
    .mc-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      width: 100%;
    }
    .mc-option {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 14px 16px;
      text-align: left;
      font-size: 0.95rem;
      font-weight: 600;
      color: #eee;
      cursor: pointer;
      transition: all 0.25s;
    }
    /* States */
    .mc-option.correct {
      background: rgba(46, 213, 115, 0.2) !important;
      border-color: #2ed573 !important;
      color: #2ed573 !important;
    }
    .mc-option.incorrect {
      background: rgba(255, 71, 87, 0.2) !important;
      border-color: #ff4757 !important;
      color: #ff4757 !important;
    }
    .mc-explanation {
      margin-top: 12px;
      font-size: 0.85rem;
      color: #aaa;
      line-height: 1.4;
      background: rgba(255,210,0,0.05);
      border-left: 2px solid #ffd200;
      padding: 8px 12px;
      border-radius: 4px;
    }

    /* ---- TYPE 3: TOP 5 LIST ---- */
    .top5-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }
    .top5-item {
      background: rgba(15, 52, 96, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .top5-item .rank {
      font-weight: 800;
      color: #ffd200;
      background: rgba(255, 210, 0, 0.1);
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 0.75rem;
    }
    .top5-item .value {
      font-weight: 700;
      color: #fff;
    }
    .top5-item.hidden-item .value {
      filter: blur(6px);
      color: transparent;
      opacity: 0.3;
    }
    .top5-item.revealed-item {
      background: #1a2d50;
      border-color: rgba(255, 210, 0, 0.3);
    }

    /* ---- SWIPE BUTTONS ---- */
    .swipe-btns {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 2;
    }
    .swipe-btns button {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 50px;
      border: none;
      background: rgba(255,255,255,0.01);
      color: rgba(255,255,255,0.1);
      font-size: 1.8rem;
      cursor: pointer;
      pointer-events: auto;
      transition: background 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .swipe-btns button:active {
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.4);
    }
    .swipe-btns .btn-prev {
      left: 0;
      border-radius: 20px 0 0 20px;
    }
    .swipe-btns .btn-next-card {
      right: 0;
      border-radius: 0 20px 20px 0;
    }

    /* ---- CONTROLS ---- */
    .controls {
      display: flex;
      gap: 10px;
      padding: 16px 0 24px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
    }
    .controls button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }
    .controls button:active {
      transform: scale(0.96);
    }
    .btn-next {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a2e;
    }
    .btn-skip {
      background: rgba(255,255,255,0.08);
      color: #888;
    }
    .btn-shuffle {
      background: rgba(255,255,255,0.08);
      color: #888;
      flex: 0.4;
      font-size: 1.2rem;
    }

    /* ---- TOAST ---- */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #2d2d44;
      color: #eee;
      padding: 10px 24px;
      border-radius: 30px;
      font-size: 0.85rem;
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      z-index: 999;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .install-banner {
      display: none;
      background: #0f3460;
      padding: 12px 16px;
      margin: 0 16px 12px;
      border-radius: 12px;
      align-items: center;
      gap: 10px;
    }
    .install-banner.show {
      display: flex;
    }
    .install-banner p {
      flex: 1;
      font-size: 0.8rem;
      color: #ccc;
    }
    .install-banner button {
      background: #ffd200;
      color: #1a1a2e;
      border: none;
      padding: 8px 16px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .install-banner .close-btn {
      background: none;
      color: #888;
      padding: 4px 8px;
      font-size: 1rem;
    }
  </style>
</head>
<body>

<header>
  <h1>🍺 BarQuiz&nbsp;<span style="font-size:0.7rem;font-weight:600;color:#ffd200;background:rgba(255,210,0,0.12);padding:2px 8px;border-radius:8px;vertical-align:middle;">v1.2.1</span></h1>
  <div class="sub">Schätzfragen für die Runde</div>
  <div class="score-row">
    <span>Richtig: <strong id="score-right">0</strong></span>
    <span>Falsch: <strong id="score-wrong">0</strong></span>
    <span>Frage <strong id="q-counter">1/50</strong></span>
  </div>
</header>

<main>
  <div class="card" id="card">
    <span class="category-badge" id="category-badge">Allgemein</span>
    <div class="question-number" id="q-num">Frage 1</div>
    <div class="question-text" id="question-text">
       Frage lädt...
    </div>
    
    <!-- Hier wird dynamisch der Fragetyp eingesetzt -->
    <div class="game-content" id="game-content"></div>

    <div class="swipe-btns">
      <button class="btn-prev" id="card-prev" aria-label="Vorherige">‹</button>
      <button class="btn-next-card" id="card-next" aria-label="Nächste">›</button>
    </div>
  </div>

  <div class="controls">
    <button class="btn-skip" id="btn-wrong">✗ Falsch</button>
    <button class="btn-next" id="btn-next">✓ Richtig →</button>
    <button class="btn-shuffle" id="btn-shuffle">🎲</button>
  </div>
</main>

<div class="toast" id="toast"></div>

<div class="install-banner" id="install-banner">
  <p>📱 Installiere BarQuiz für den schnellen Zugriff</p>
  <button id="install-btn">Installieren</button>
  <button class="close-btn" id="install-close">✕</button>
</div>

<script>
// SERVICE WORKER (PWA OFFLINE + SOFORT-UPDATE CHECK)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then((reg) => {
    reg.onupdatefound = () => {
      const installingWorker = reg.installing;
      installingWorker.onstatechange = () => {
        if (installingWorker.state === 'installed') {
          if (navigator.serviceWorker.controller) {
            showToast('🔄 Neue Version geladen! Starte neu...');
            setTimeout(() => {
              window.location.reload(true);
            }, 1500);
          }
        }
      };
    };
  });
}

// ============================================================
// GAME STATE
// ============================================================
let currentIndex = 0;
let shuffled = [];
let scoreRight = 0;
let scoreWrong = 0;
let isRevealed = false; // Für Schätzen/Top 5
let hasSelectedMC = false; // Für Multiple Choice
let toastTimer = null;

// Shuffle & Game-Init
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function resetShuffle() {
  shuffled = shuffleArray([...QUESTIONS]);
  currentIndex = 0;
}

// Rendert die Frage und passt das Spiel-Interface an
function showQuestion(index) {
  const q = shuffled[index];
  
  // Header-Metadaten
  document.getElementById('category-badge').textContent = q.cat;
  document.getElementById('q-num').textContent = `Frage ${index + 1} von ${shuffled.length}`;
  document.getElementById('question-text').textContent = q.q;
  document.getElementById('q-counter').textContent = `${index + 1}/${shuffled.length}`;

  const container = document.getElementById('game-content');
  container.innerHTML = ''; // Box leeren

  // Status zurücksetzen
  isRevealed = false;
  hasSelectedMC = false;

  // Render basierend auf Fragetyp
  if (q.type === 'estimate') {
    container.innerHTML = `
      <div class="answer-section">
        <div class="answer-box hidden" id="answer-box">
          <span class="answer-text" id="answer-text">${q.a}</span>
        </div>
        <div class="tap-hint" id="tap-hint">👆 Tippen zum Aufdecken</div>
      </div>
    `;
    
    // Event listener für klassisches Aufdecken
    document.getElementById('answer-box').addEventListener('pointerdown', (e) => {
      if (e.button === 0) revealAnswer();
    });

  } else if (q.type === 'multiple') {
    let optionsHtml = '';
    q.options.forEach((opt, idx) => {
      optionsHtml += `
        <button class="mc-option" onclick="handleMCSelection(${idx}, ${q.correctIndex})">
          ${String.fromCharCode(65 + idx)}) ${opt}
        </button>
      `;
    });
    container.innerHTML = `
      <div class="mc-grid">
        ${optionsHtml}
      </div>
      <div class="mc-explanation" id="mc-explanation" style="display: none;">
        ${q.a}
      </div>
    `;

  } else if (q.type === 'top5') {
    let listHtml = '';
    q.items.forEach((item, idx) => {
      listHtml += `
        <div class="top5-item revealed-item">
          <span class="rank">${idx + 1}</span>
          <span class="value">${item.val}</span>
        </div>
      `;
    });
    container.innerHTML = `
      <div class="top5-list">
        ${listHtml}
      </div>
    `;
    // Top5 ist per se "aufgedeckt"
    isRevealed = true;
}

// Suchen der passenden UI-Elemente zum Aufdecken der Schätzfrage
function revealAnswer() {
  const box = document.getElementById('answer-box');
  if (!box || !box.classList.contains('hidden')) return;
  box.classList.remove('hidden');
  box.classList.add('revealed');
  const tip = document.getElementById('tap-hint');
  if (tip) tip.textContent = '';
  isRevealed = true;
}

// Steuerung Multiple Choice Antworten
function handleMCSelection(selectedIndex, correctIndex) {
  if (hasSelectedMC) return; // Nur einmal wählen erlaubt
  hasSelectedMC = true;

  const buttons = document.getElementsByClassName('mc-option');
  
  // Auswertung für jeden Button
  for (let i = 0; i < buttons.length; i++) {
    if (i === correctIndex) {
      buttons[i].classList.add('correct');
    } else if (i === selectedIndex) {
      buttons[i].classList.add('incorrect');
    }
  }

  // Erkennung für Score (automatisch bewerten für den User)
  if (selectedIndex === correctIndex) {
    showToast('🎉 Richtig!');
    scoreRight++;
    document.getElementById('score-right').textContent = scoreRight;
  } else {
    showToast('😢 Falsch!');
    scoreWrong++;
    document.getElementById('score-wrong').textContent = scoreWrong;
  }

  // Erklärungstext einblenden
  const expl = document.getElementById('mc-explanation');
  if (expl) expl.style.display = 'block';

  // Markiere MC als "revealed" damit Swipe / Weiter geht
  isRevealed = true;
}

// Steuerung Top 5 Einzel-Aufdecken
function revealTop5Item(idx) {
  const item = document.getElementById(`top5-${idx}`);
  const lock = document.getElementById(`top5-lock-${idx}`);
  if (!item || !item.classList.contains('hidden-item')) return;

  item.classList.remove('hidden-item');
  item.classList.add('revealed-item');
  if (lock) lock.textContent = '👁️';

  // Wenn alle 5 aufgedeckt sind, markiere die Frage als komplett gelöst
  const hiddenActive = document.querySelectorAll('.top5-item.hidden-item');
  if (hiddenActive.length === 0) {
    isRevealed = true;
    const hint = document.getElementById('tap-hint');
    if (hint) hint.textContent = '✅ Alle aufgedeckt!';
  }
}

// Nächste Frage Logik
function nextQuestion() {
  currentIndex++;
  if (currentIndex >= shuffled.length) {
    showToast('🎉 Alle 65 Fragen gelöst! Mische neu...');
    resetShuffle();
  }
  showQuestion(currentIndex);
}

// Vorherige Frage (für linken Pfeil)
function prevQuestion() {
  if (currentIndex > 0) {
    currentIndex--;
    showQuestion(currentIndex);
  } else {
    showToast('🎲 Schon bei der ersten Frage!');
  }
}

// Toast-System
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ============================================================
// EVENT LISTENERS CONTROLS
// ============================================================
document.getElementById('btn-next').addEventListener('click', () => {
  // Wenn klassische Schätzfrage nicht aufgedeckt, erst aufdecken
  const current = shuffled[currentIndex];
  if (current.type === 'estimate' && !isRevealed) { revealAnswer(); return; }
  
  if (current.type === 'multiple' && !hasSelectedMC) {
    showToast('👉 Wähle erst eine Antwort!');
    return;
  }

  if (current.type !== 'multiple') {
    scoreRight++;
    document.getElementById('score-right').textContent = scoreRight;
  }
  nextQuestion();
});

document.getElementById('btn-wrong').addEventListener('click', () => {
  const current = shuffled[currentIndex];
  if (current.type === 'estimate' && !isRevealed) { revealAnswer(); return; }
  
  if (current.type === 'multiple' && !hasSelectedMC) {
    showToast('👉 Wähle erst eine Antwort!');
    return;
  }

  if (current.type !== 'multiple') {
    scoreWrong++;
    document.getElementById('score-wrong').textContent = scoreWrong;
  }
  nextQuestion();
});

document.getElementById('btn-shuffle').addEventListener('click', () => {
  resetShuffle();
  showQuestion(0);
  showToast('🎲 Neu gemischt!');
});

// Card-Navi-Pfeile (nur Navigation, KEIN Score)
document.getElementById('card-next').addEventListener('click', () => {
  nextQuestion();
});
document.getElementById('card-prev').addEventListener('click', () => {
  prevQuestion();
});

// ============================================================
// SWIPE-GESTE (via Pointer Events — fehlerfrei inkl. Klick-Sperre)
// ============================================================
(function() {
  const card = document.getElementById('card');
  let startX = 0, dx = 0, swiping = false;

  card.addEventListener('pointerdown', (e) => {
    // Falls ein Button, Option oder das Antwortfeld getroffen wurde -> Geste ignorieren!
    if (e.target.closest('button') || e.target.closest('#answer-box') || e.target.closest('.mc-option') || e.target.closest('.top5-item')) {
      return;
    }
    if (e.button !== 0) return;
    startX = e.clientX;
    dx = 0;
    swiping = false;
    card.classList.remove('swiping');
    card.setPointerCapture(e.pointerId);
  });

  card.addEventListener('pointermove', (e) => {
    if (e.buttons !== 1) return;
    const moveX = e.clientX - startX;
    if (Math.abs(moveX) < 15) return;

    e.preventDefault();
    swiping = true;
    card.classList.add('swiping');
    dx = moveX;
    card.style.transform = `translateX(${dx * 0.5}px) rotate(${dx * 0.02}deg)`;
    card.style.opacity = Math.max(0.2, 1 - Math.abs(dx) / 400);
  });

  card.addEventListener('pointerup', () => {
    if (!swiping) return;
    swiping = false;

    if (Math.abs(dx) < 80) {
      card.classList.remove('swiping');
      card.style.transform = '';
      card.style.opacity = '';
      return;
    }

    const dir = dx > 0 ? 'right' : 'left';
    const current = shuffled[currentIndex];

    // Antwort aufdecken falls nötig
    if (current.type === 'estimate' && !isRevealed) revealAnswer();

    // Slide-out
    card.classList.remove('swiping');
    void card.offsetHeight;
    card.style.transform = dir === 'right'
      ? 'translateX(120%) rotate(8deg)'
      : 'translateX(-120%) rotate(-8deg)';
    card.style.opacity = '0';

        // Nächste Frage
    setTimeout(() => {
      nextQuestion();
      card.classList.add('swiping');
      card.style.transform = 'translateX(80px)';
      card.style.opacity = '0';
      requestAnimationFrame(() => {
        card.classList.remove('swiping');
        card.style.transform = '';
        card.style.opacity = '';
      });
    }, 300);
  });
})();

// ============================================================
// PWA INSTALL BANNER
// ============================================================
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem('barquiz-install-dismissed')) {
    document.getElementById('install-banner').classList.add('show');
  }
});

document.getElementById('install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const result = await deferredPrompt.userChoice;
  if (result.outcome === 'accepted') showToast('✅ Installiert! Prost! 🍺');
  deferredPrompt = null;
  document.getElementById('install-banner').classList.remove('show');
});

document.getElementById('install-close').addEventListener('click', () => {
  document.getElementById('install-banner').classList.remove('show');
  localStorage.setItem('barquiz-install-dismissed', '1');
});

// ============================================================
// APP START
// ============================================================
resetShuffle();
showQuestion(0);
